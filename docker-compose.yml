services:
  postgres:
    image: postgres:14
    container_name: postgres-mcp-training
    environment:
      POSTGRES_DB: mcp_training
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: mcp_password
    ports:
      - "5433:5432"   # 宿主机 5433 → 容器 5432，避免与本机 Postgres 冲突
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7.0
    container_name: redis-mcp-training
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    command: redis-server --appendonly yes

  # 后端服务（含 Go + Python 及训练依赖，开箱即用）
  app:
    build: .
    container_name: mcp-training-app
    ports:
      - "8080:8080"
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: mcp_user
      DB_PASSWORD: mcp_password
      DB_NAME: mcp_training
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      UPLOAD_DIR: /app/data/uploads
      CLEANED_DIR: /app/data/cleaned
      MODEL_DIR: /app/data/models
      REPORT_DIR: /app/reports
      PYTHON_PATH: python3
      PYTHON_SCRIPTS_DIR: /app/python_scripts
    volumes:
      - app_data:/app/data
      - app_reports:/app/reports
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  app_data:      # 数据集上传、清洗结果、训练产出模型
  app_reports:   # 评估报告