project_name: ner-qlora-general-demo
base_model: Qwen/Qwen2.5-0.5B-Instruct
semantic_task:
  family: SequenceTagging
  name: NER
training_method:
  name: QLoRA
  params:
    r: 16
    alpha: 32
    bits: 4
domain:
  name: General
metrics:
  - entity_f1
runtime:
  epochs: 2
  batch_size: 4
  learning_rate: 0.0002
artifacts:
  output_dir: outputs/ner-qlora-general
